# ============================================================
# Kubernetes TLS Secret Expiry Monitor – Configuration
# ============================================================
# All values here can be overridden by environment variables
# prefixed with K8S_TLS_ (see README for the full mapping).

# Alert if a certificate expires within this many days
expiry_threshold_days: 30

# When running in --daemon mode, how often to re-scan (hours)
poll_interval_hours: 24

# Namespaces to scan. Leave empty [] to scan ALL namespaces.
namespaces: []
  # - default
  # - istio-system
  # - ingress-nginx

# Print alerts to stdout (always recommended as a fallback)
console_enabled: true

# ── Email alerts ──────────────────────────────────────────────
email:
  enabled: false
  smtp_host: "smtp.gmail.com"
  smtp_port: 587
  smtp_user: "your-email@gmail.com"
  smtp_password: "your-app-password"        # Use App Passwords for Gmail
  from: "k8s-tls-monitor@yourcompany.com"
  to:
    - "platform-team@yourcompany.com"
    - "oncall@yourcompany.com"

# ── Slack alerts ──────────────────────────────────────────────
slack:
  enabled: false
  webhook_url: "https://hooks.slack.com/services/T00000000/B00000000/XXXXXXXXXXXXXXXXXXXXXXXX"
