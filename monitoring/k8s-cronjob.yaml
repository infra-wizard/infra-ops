apiVersion: v1
kind: ServiceAccount
metadata:
  name: tls-expiry-monitor
  namespace: monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: tls-secret-reader
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["list", "get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: tls-expiry-monitor-binding
subjects:
  - kind: ServiceAccount
    name: tls-expiry-monitor
    namespace: monitoring
roleRef:
  kind: ClusterRole
  name: tls-secret-reader
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: tls-expiry-monitor
  namespace: monitoring
spec:
  schedule: "0 8 * * *"          # Every day at 08:00 UTC
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          serviceAccountName: tls-expiry-monitor
          restartPolicy: OnFailure
          containers:
            - name: tls-monitor
              image: your-registry/k8s-tls-expiry-monitor:latest
              env:
                - name: K8S_TLS_EXPIRY_DAYS
                  value: "30"
                - name: K8S_TLS_SLACK_ENABLED
                  value: "true"
                - name: K8S_TLS_SLACK_WEBHOOK
                  valueFrom:
                    secretKeyRef:
                      name: tls-monitor-secrets
                      key: slack-webhook-url
                # Uncomment for email alerts:
                # - name: K8S_TLS_EMAIL_ENABLED
                #   value: "true"
                # - name: K8S_TLS_SMTP_PASSWORD
                #   valueFrom:
                #     secretKeyRef:
                #       name: tls-monitor-secrets
                #       key: smtp-password
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 128Mi
