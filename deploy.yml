apiVersion: apps/v1
kind: Deployment
metadata:
  name: cert-expiry-monitor
  namespace: default                    # change to your namespace
  labels:
    app: cert-expiry-monitor
spec:
  replicas: 1                           # only 1 replica — avoids duplicate emails
  selector:
    matchLabels:
      app: cert-expiry-monitor
  template:
    metadata:
      labels:
        app: cert-expiry-monitor
    spec:
      # ── Security context (run as non-root) ────────────────────────────────
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000

      containers:
        - name: cert-monitor
          image: <YOUR_ACR>.azurecr.io/cert-expiry-monitor:latest   # ← replace
          imagePullPolicy: Always

          # ── Env from settings ConfigMap (SMTP, schedule, columns, etc.) ───
          envFrom:
            - configMapRef:
                name: cert-monitor-config   # your settings ConfigMap

          # ── SMTP password from Secret ─────────────────────────────────────
          env:
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cert-monitor-secret
                  key: SMTP_PASSWORD

            # Tell the app exactly where the mounted xlsx file will be
            - name: DATA_FILE
              value: "/data/certs.xlsx"

          # ── Mount the xlsx ConfigMap as a file at /data/ ──────────────────
          volumeMounts:
            - name: cert-data-volume
              mountPath: /data          # file appears as /data/certs.xlsx
              readOnly: true

          # ── Resource limits ───────────────────────────────────────────────
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"

      # ── Volumes ───────────────────────────────────────────────────────────
      volumes:
        - name: cert-data-volume
          configMap:
            name: cert-data-file        # ← name of the ConfigMap created from xlsx
            # Kubernetes mounts each key as a file.
            # If your ConfigMap key is "certs.xlsx", the file lands at /data/certs.xlsx
            # If kubectl used a different key name, set it explicitly:
            items:
              - key: certs.xlsx         # ← exact key name inside the ConfigMap
                path: certs.xlsx        # ← filename the pod will see at /data/

      restartPolicy: Always
