apiVersion: apps/v1
kind: Deployment
metadata:
  name: cert-expiry-monitor
  namespace: default
  labels:
    app: cert-expiry-monitor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cert-expiry-monitor
  template:
    metadata:
      labels:
        app: cert-expiry-monitor
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000

      containers:
        - name: cert-monitor
          image: <YOUR_ACR>.azurecr.io/cert-expiry-monitor:latest
          imagePullPolicy: Always

          # ── All non-secret settings from ConfigMap ────────────────────────
          envFrom:
            - configMapRef:
                name: cert-monitor-config

          # ── SMTP password from Secret ─────────────────────────────────────
          env:
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cert-monitor-secret
                  key: SMTP_PASSWORD
            # CSV file path inside the pod
            - name: DATA_FILE
              value: "/data/certs.csv"

          # ── Mount CSV ConfigMap as /data/certs.csv ────────────────────────
          volumeMounts:
            - name: cert-data-volume
              mountPath: /data
              readOnly: true

          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"

      volumes:
        - name: cert-data-volume
          configMap:
            name: cert-data-file
            items:
              - key: certs.csv      # ← must match kubectl --from-file key
                path: certs.csv     # pod sees /data/certs.csv

      restartPolicy: Always
